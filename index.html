<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이를 얼마나 알고 있나요?</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF6F0; --warm-white:#FFF9F2; --deep-brown:#2C1810;
    --rich-brown:#5C3D2E; --terracotta:#C1602A; --amber:#E8944A;
    --gold:#D4A853; --soft-sage:#8FA68C; --dust-pink:#E8C4B0;
    --shadow:rgba(44,24,16,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--deep-brown);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 20%,rgba(212,168,83,0.10) 0%,transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(193,96,42,0.08) 0%,transparent 50%);pointer-events:none;z-index:0;}

  /* LANG BAR */
  .lang-bar{width:100%;max-width:640px;display:flex;align-items:center;padding:12px 20px;position:relative;z-index:10;gap:8px;}
  .hall-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--gold);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--gold);cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-right:auto;}
  .hall-btn:hover{background:var(--gold);color:#fff;}
  .lang-btn{padding:6px 14px;border-radius:20px;border:2px solid rgba(193,96,42,0.25);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--rich-brown);cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
  .lang-btn.active{background:var(--terracotta);border-color:var(--terracotta);color:#fff;}
  .lang-btn:hover:not(.active){border-color:var(--terracotta);color:var(--terracotta);}

  /* CONTAINER */
  .container{width:100%;max-width:640px;padding:0 20px 40px;position:relative;z-index:1;}

  /* SCREENS */
  .screen{display:none;animation:fadeIn 0.5s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  /* CARD */
  .card{background:var(--warm-white);border-radius:24px;padding:36px 32px;box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,0 8px 40px var(--shadow);border:1px solid rgba(212,168,83,0.2);}

  /* START */
  .title-deco{text-align:center;font-size:44px;margin-bottom:8px;}
  .title-main{font-family:'Nanum Myeongjo',serif;font-size:24px;font-weight:800;text-align:center;line-height:1.4;color:var(--deep-brown);margin-bottom:6px;}
  .title-sub{text-align:center;font-size:12px;color:var(--rich-brown);opacity:0.5;letter-spacing:2px;margin-bottom:24px;font-weight:300;}
  .divider{width:48px;height:2px;background:linear-gradient(90deg,var(--gold),var(--terracotta));margin:0 auto 24px;border-radius:2px;}
  .start-desc{text-align:center;font-size:14px;color:var(--rich-brown);line-height:1.8;margin-bottom:24px;opacity:0.85;}
  .field-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--terracotta);margin-bottom:8px;text-transform:uppercase;}
  .name-input{width:100%;padding:13px 16px;border:2px solid rgba(193,96,42,0.2);border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:16px;color:var(--deep-brown);background:var(--cream);outline:none;margin-bottom:22px;transition:border-color 0.2s;}
  .name-input:focus{border-color:var(--terracotta);}
  .name-input::placeholder{color:rgba(92,61,46,0.35);}
  .count-buttons{display:flex;gap:10px;justify-content:center;margin-bottom:24px;}
  .count-btn{flex:1;max-width:110px;padding:14px 8px;border:2px solid rgba(212,168,83,0.3);background:transparent;border-radius:14px;font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:var(--rich-brown);cursor:pointer;transition:all 0.25s;}
  .count-btn span{display:block;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:400;color:var(--rich-brown);opacity:0.6;margin-top:2px;}
  .count-btn:hover,.count-btn.selected{border-color:var(--terracotta);background:rgba(193,96,42,0.07);color:var(--terracotta);transform:translateY(-2px);box-shadow:0 6px 18px rgba(193,96,42,0.15);}
  .count-btn.selected span{color:var(--terracotta);opacity:0.8;}
  .start-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--terracotta),var(--amber));color:white;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.25s;box-shadow:0 4px 18px rgba(193,96,42,0.35);}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(193,96,42,0.45);}
  .start-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  /* QUIZ */
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .quiz-progress-text{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--terracotta);}
  .quiz-score-text{font-size:12px;color:var(--rich-brown);opacity:0.6;}
  .progress-bar{width:100%;height:4px;background:rgba(193,96,42,0.12);border-radius:2px;margin-bottom:20px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--terracotta),var(--amber));border-radius:2px;transition:width 0.5s ease;}
  .cat-image-wrap{width:100%;border-radius:16px;overflow:hidden;margin-bottom:18px;background:var(--dust-pink);position:relative;box-shadow:0 4px 18px var(--shadow);min-height:120px;}
  .cat-image-wrap img{width:100%;height:auto;max-height:420px;object-fit:contain;display:block;transition:opacity 0.4s;background:var(--dust-pink);}
  .cat-image-wrap .img-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.4;transform:scale(0.95);}50%{opacity:1;transform:scale(1.05);}}
  .type-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:20px;margin-bottom:8px;text-transform:uppercase;}
  .type-badge.origin{background:rgba(143,166,140,0.15);color:var(--soft-sage);border:1px solid rgba(143,166,140,0.3);}
  .type-badge.breed{background:rgba(212,168,83,0.15);color:var(--gold);border:1px solid rgba(212,168,83,0.3);}
  .question-text{font-family:'Nanum Myeongjo',serif;font-size:19px;font-weight:700;color:var(--deep-brown);line-height:1.4;margin-bottom:18px;}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
  .option-btn{padding:14px 10px;border:2px solid rgba(92,61,46,0.14);background:transparent;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--rich-brown);cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3;}
  .option-btn:hover:not(:disabled){border-color:var(--amber);background:rgba(232,148,74,0.06);transform:translateY(-1px);}
  .option-btn.selected{border-color:var(--terracotta);background:rgba(193,96,42,0.08);color:var(--terracotta);font-weight:700;}
  .option-btn.correct{border-color:var(--soft-sage);background:rgba(143,166,140,0.15);color:#4a7a47;font-weight:700;}
  .option-btn.wrong{border-color:#d44;background:rgba(221,68,68,0.08);color:#c33;font-weight:700;}
  .option-btn:disabled{cursor:default;}
  .check-btn{width:100%;padding:15px;background:var(--deep-brown);color:var(--cream);border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-bottom:12px;}
  .check-btn:hover:not(:disabled){background:var(--rich-brown);transform:translateY(-1px);}
  .check-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
  .feedback-box{display:none;border-radius:14px;padding:16px;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .feedback-box.correct-fb{background:rgba(143,166,140,0.12);border:1px solid rgba(143,166,140,0.35);}
  .feedback-box.wrong-fb{background:rgba(221,68,68,0.06);border:1px solid rgba(221,68,68,0.2);}
  .feedback-result{font-size:15px;font-weight:700;margin-bottom:7px;}
  .feedback-box.correct-fb .feedback-result{color:#4a7a47;}
  .feedback-box.wrong-fb  .feedback-result{color:#c33;}
  .feedback-explanation{font-size:12px;color:var(--rich-brown);line-height:1.7;opacity:0.85;}
  .next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--terracotta),var(--amber));color:white;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:12px;display:none;transition:all 0.2s;box-shadow:0 4px 14px rgba(193,96,42,0.3);}
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(193,96,42,0.4);}

  /* RESULT */
  .result-emoji{text-align:center;font-size:52px;margin-bottom:10px;}
  .result-title{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;text-align:center;color:var(--deep-brown);margin-bottom:5px;}
  .result-subtitle{text-align:center;font-size:11px;color:var(--rich-brown);opacity:0.5;letter-spacing:1px;margin-bottom:20px;}
  .score-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--terracotta),var(--amber));margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(193,96,42,0.35);}
  .score-number{font-family:'Nanum Myeongjo',serif;font-size:38px;font-weight:800;color:white;line-height:1;}
  .score-total{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;}
  .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-box{background:rgba(92,61,46,0.05);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(92,61,46,0.08);}
  .stat-value{font-family:'Nanum Myeongjo',serif;font-size:24px;font-weight:700;color:var(--terracotta);}
  .stat-label{font-size:11px;color:var(--rich-brown);opacity:0.6;margin-top:3px;letter-spacing:1px;}
  .result-message{text-align:center;font-size:13px;line-height:1.8;color:var(--rich-brown);opacity:0.8;margin-bottom:18px;font-style:italic;}

  /* TOP10 */
  .section-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold);margin-bottom:10px;text-align:center;text-transform:uppercase;}
  .top10-list{margin-bottom:20px;}
  .rank-row{display:flex;align-items:center;padding:9px 12px;border-radius:10px;margin-bottom:5px;background:rgba(92,61,46,0.04);border:1px solid rgba(92,61,46,0.07);}
  .rank-row.me{background:rgba(193,96,42,0.08);border-color:rgba(193,96,42,0.25);}
  .rank-num{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700;width:30px;color:var(--rich-brown);}
  .rank-num.gold{color:#D4A853;} .rank-num.silver{color:#9E9E9E;} .rank-num.bronze{color:#A0522D;}
  .rank-name{flex:1;font-size:13px;color:var(--deep-brown);}
  .rank-score{font-size:13px;font-weight:700;color:var(--terracotta);}

  .retry-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--terracotta),var(--amber));color:white;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.25s;box-shadow:0 4px 18px rgba(193,96,42,0.35);}
  .retry-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(193,96,42,0.45);}

  /* HALL OF FAME */
  .hof-title-deco{text-align:center;font-size:38px;margin-bottom:8px;}
  .hof-main-title{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;text-align:center;color:var(--deep-brown);margin-bottom:4px;}
  .hof-sub{text-align:center;font-size:11px;color:var(--rich-brown);opacity:0.5;letter-spacing:2px;margin-bottom:24px;}
  .hof-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
  .hof-table th{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--terracotta);text-align:left;padding:9px 12px;border-bottom:2px solid rgba(193,96,42,0.2);text-transform:uppercase;}
  .hof-table th:last-child{text-align:right;}
  .hof-table td{padding:11px 12px;font-size:13px;color:var(--deep-brown);border-bottom:1px solid rgba(92,61,46,0.07);}
  .hof-table td:last-child{text-align:right;font-weight:700;color:var(--terracotta);}
  .hof-table tr:hover td{background:rgba(193,96,42,0.04);}
  .hof-rank-cell{font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:700;width:40px;}
  .hof-back-btn{width:100%;padding:15px;background:var(--deep-brown);color:var(--cream);border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
  .hof-back-btn:hover{background:var(--rich-brown);transform:translateY(-1px);}
  .hof-loading{text-align:center;padding:36px;font-size:30px;animation:pulse 1.2s infinite;}
  .hof-empty{text-align:center;padding:36px;color:var(--rich-brown);opacity:0.5;font-size:13px;line-height:1.8;}

  .footer-note{text-align:center;font-size:11px;color:var(--rich-brown);opacity:0.4;margin-top:18px;letter-spacing:1px;}

  /* SAVING */
  .saving-overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,0.5);z-index:100;align-items:center;justify-content:center;}
  .saving-overlay.show{display:flex;}
  .saving-box{background:var(--warm-white);border-radius:18px;padding:28px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
  .saving-spin{font-size:36px;animation:spin 1s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .saving-box p{font-size:15px;font-weight:700;color:var(--deep-brown);margin-top:10px;}
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <button class="hall-btn" id="hall-btn" onclick="showHallOfFame()">🏆 명예의 전당</button>
  <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
</div>

<div class="container">

  <!-- START -->
  <div class="screen active" id="screen-start">
    <div class="card">
      <div class="title-deco">🐱</div>
      <h1 class="title-main" id="title-main">고양이를 얼마나<br>알고 있나요?</h1>
      <p class="title-sub">CAT KNOWLEDGE QUIZ</p>
      <div class="divider"></div>
      <p class="start-desc" id="start-desc">고양이의 <strong>고향</strong>과 <strong>품종</strong>을 맞혀보세요.<br>사진을 보고 정답을 골라주세요! 🐾</p>
      <p class="field-label" id="label-name">참여자 이름</p>
      <input class="name-input" id="name-input" type="text" placeholder="이름을 입력하세요" oninput="onNameInput()">
      <p class="field-label" id="label-count">문제 수 선택</p>
      <div class="count-buttons">
        <button class="count-btn" onclick="selectCount(10,this)">10<span id="qs-label-0">문제</span></button>
        <button class="count-btn" onclick="selectCount(20,this)">20<span id="qs-label-1">문제</span></button>
        <button class="count-btn" onclick="selectCount(30,this)">30<span id="qs-label-2">문제</span></button>
      </div>
      <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>퀴즈 시작하기 →</button>
    </div>
    <p class="footer-note" id="footer-note">🐾 고양이 사진은 The Cat API에서 제공됩니다</p>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="card">
      <div class="quiz-header">
        <span class="quiz-progress-text" id="progress-text">1 / 10</span>
        <span class="quiz-score-text" id="score-text">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="cat-image-wrap">
        <div class="img-loading" id="img-loading">🐱</div>
        <img id="cat-img" src="" alt="Cat" style="opacity:0" onload="onImageLoad()">
      </div>
      <span class="type-badge" id="type-badge"></span>
      <p class="question-text" id="question-text"></p>
      <div class="options-grid" id="options-grid"></div>
      <button class="check-btn" id="check-btn" onclick="checkAnswer()" disabled>정답 확인</button>
      <div class="feedback-box" id="feedback-box">
        <p class="feedback-result" id="feedback-result"></p>
        <p class="feedback-explanation" id="feedback-explanation"></p>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <h2 class="result-title" id="result-title">퀴즈 완료!</h2>
      <p class="result-subtitle" id="result-subtitle">QUIZ COMPLETE</p>
      <div class="divider"></div>
      <div class="score-circle">
        <div class="score-number" id="final-score">0</div>
        <div class="score-total" id="final-total">/ 10 점</div>
      </div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-value" id="stat-correct">0</div><div class="stat-label" id="label-correct">정답</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label" id="label-wrong">오답</div></div>
      </div>
      <p class="result-message" id="result-message"></p>
      <p class="section-title" id="top10-title">🏅 TOP 10 랭킹</p>
      <div class="top10-list" id="top10-list"><div class="hof-loading">🐱</div></div>
      <button class="retry-btn" id="retry-btn" onclick="resetQuiz()">다시 도전하기 🐾</button>
    </div>
    <p class="footer-note">🐾 <span id="footer-note2">고양이 사진은 The Cat API에서 제공됩니다</span></p>
  </div>

  <!-- HALL OF FAME -->
  <div class="screen" id="screen-hof">
    <div class="card">
      <div class="hof-title-deco">🏆</div>
      <h2 class="hof-main-title" id="hof-main-title">명예의 전당</h2>
      <p class="hof-sub" id="hof-sub">TOP 20 랭킹</p>
      <div class="divider"></div>
      <div id="hof-content"><div class="hof-loading">🐱</div></div>
      <button class="hof-back-btn" id="hof-back-btn" onclick="goBack()">← 돌아가기</button>
      <button class="retry-btn" id="hof-restart-btn" onclick="resetQuiz()" style="margin-top:10px;">처음으로 🐾</button>
    </div>
  </div>

</div>

<div class="saving-overlay" id="saving-overlay">
  <div class="saving-box">
    <div class="saving-spin">🐾</div>
    <p id="saving-text">점수 저장 중...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAJFodCtd0nZ9R3FIjKN0FSsBvFZkYVcqo",
  authDomain:"cat-quiz-ece53.firebaseapp.com",
  projectId:"cat-quiz-ece53",
  storageBucket:"cat-quiz-ece53.firebasestorage.app",
  messagingSenderId:"306933977395",
  appId:"1:306933977395:web:bd9d55fc46d0091d95ae46"
});
const db = getFirestore(app);

// ── DATA ──────────────────────────────────────────────────────────

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickRandom(arr,n,exc){return shuffle(arr.filter(x=>x!==exc)).slice(0,n);}

function buildQuestions(n){
  const pool=shuffle(BREEDS); const qs=[];
  for(let i=0;i<n;i++){
    const b=pool[i%pool.length]; const type=Math.random()<0.2?'origin':'breed';
    if(type==='origin'){
      const wKo=pickRandom(COUNTRIES_KO,3,b.oko);
      const wEn=COUNTRIES_EN.filter(x=>x!==b.oen); shuffle(wEn);
      const idx=shuffle([0,1,2,3]);
      const oKo=[b.oko,...wKo]; const oEn=[b.oen,...wEn.slice(0,3)];
      qs.push({type:'origin',b,aKo:b.oko,aEn:b.oen,oKo:idx.map(i=>oKo[i]),oEn:idx.map(i=>oEn[i]),exKo:b.dko,exEn:b.den});
    } else {
      const wKo=pickRandom(BREEDS_KO,3,b.nko);
      const wEn=BREEDS_EN.filter(x=>x!==b.nen); shuffle(wEn);
      const idx=shuffle([0,1,2,3]);
      const oKo=[b.nko,...wKo]; const oEn=[b.nen,...wEn.slice(0,3)];
      qs.push({type:'breed',b,aKo:b.nko,aEn:b.nen,oKo:idx.map(i=>oKo[i]),oEn:idx.map(i=>oEn[i]),exKo:b.d2ko||b.dko,exEn:b.d2en||b.den});
    }
  }
  return qs;
}

let audioCtx=null;

function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// iOS: 첫 터치 시 AudioContext 미리 활성화
document.addEventListener('touchstart',function initAudio(){
  getAudioCtx();
  document.removeEventListener('touchstart',initAudio);
},{once:true});

// 정답: 귀여운 상승 팡파레 3음
function playCorrectSound(){
  try{
    const ctx=getAudioCtx(); const t0=ctx.currentTime;
    [[523,0],[659,0.13],[784,0.26],[1047,0.40]].forEach(([freq,delay])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(freq,t0+delay);
      g.gain.setValueAtTime(0,t0+delay);
      g.gain.linearRampToValueAtTime(0.18,t0+delay+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t0+delay+0.22);
      o.start(t0+delay); o.stop(t0+delay+0.23);
    });
  }catch(e){}
}

// 오답: 귀여운 하강 2음 (뚝뚝)

  try{
    const ctx=getAudioCtx(); const t0=ctx.currentTime;
    // 3음으로 늘리고 각 음 길이도 길게
    [[330,0,0.30],[262,0.35,0.30],[220,0.70,0.45]].forEach(([freq,delay,dur])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(freq,t0+delay);
      o.frequency.linearRampToValueAtTime(freq*0.82,t0+delay+dur);
      g.gain.setValueAtTime(0,t0+delay);
      g.gain.linearRampToValueAtTime(0.16,t0+delay+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t0+delay+dur+0.05);

}

// ── BGM ──────────────────────────────────────────────────────────
let bgmNodes=[];
let bgmSessionId=0; // 세션 ID로 이전 루프 완전 차단

function stopBgm(){
  bgmSessionId++; // 이전 모든 루프 무효화
  bgmNodes.forEach(n=>{try{n.stop();}catch(e){}});
  bgmNodes=[];
}

// 귀여운 왈츠풍 BGM (시작화면 & 결과화면)
function playStartBgm(){
  stopBgm();
  const mySession=++bgmSessionId;
  try{
    const ctx=getAudioCtx();
    const melody=[
      [523,0,0.28],[659,0.33,0.28],[784,0.66,0.28],[880,1.0,0.42],
      [784,1.5,0.20],[659,1.75,0.20],[784,2.0,0.55],
      [698,2.66,0.28],[784,3.0,0.28],[880,3.33,0.28],[1047,3.66,0.42],
      [880,4.16,0.20],[784,4.41,0.20],[880,4.66,0.55],
      [784,5.33,0.20],[698,5.55,0.20],[659,5.77,0.20],[523,6.0,0.55],
      [659,6.66,0.20],[523,6.88,0.20],[440,7.10,0.20],[523,7.33,0.55],
    ];
    const bass=[
      [262,0,0.22],[196,0.33,0.22],[196,0.66,0.22],
      [262,1.0,0.22],[196,1.5,0.22],[196,2.0,0.22],
      [349,2.66,0.22],[262,3.0,0.22],[262,3.33,0.22],
      [349,3.66,0.22],[262,4.16,0.22],[262,4.66,0.22],
      [392,5.33,0.22],[294,5.77,0.22],[262,6.0,0.22],
      [330,6.66,0.22],[262,7.10,0.22],[262,7.33,0.22],
    ];
    const loopLen=8.0;
    function scheduleBgm(){
      if(bgmSessionId!==mySession)return;
      const t0=ctx.currentTime+0.05;
      [...melody].forEach(([freq,when,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='triangle';
        o.frequency.setValueAtTime(freq,t0+when);
        g.gain.setValueAtTime(0,t0+when);
        g.gain.linearRampToValueAtTime(0.09,t0+when+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,t0+when+dur);
        o.start(t0+when);o.stop(t0+when+dur+0.01);
        bgmNodes.push(o);
      });
      [...bass].forEach(([freq,when,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';
        o.frequency.setValueAtTime(freq,t0+when);
        g.gain.setValueAtTime(0,t0+when);
        g.gain.linearRampToValueAtTime(0.06,t0+when+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t0+when+dur);
        o.start(t0+when);o.stop(t0+when+dur+0.01);
        bgmNodes.push(o);
      });
      setTimeout(()=>{ if(bgmSessionId===mySession) scheduleBgm(); },(loopLen-0.3)*1000);
    }
    scheduleBgm();
  }catch(e){}
}

  const ok=idx>=0&&q.oKo[idx]===q.aKo;
  lastAnswerOk=ok;
  if(ok){score++;playCorrectSound();}else{playWrongSound();}
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(q.oKo[i]===q.aKo)btn.classList.add('correct');
    else if(i===idx&&!ok)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback-box');fb.style.display='block';fb.className=`feedback-box ${ok?'correct-fb':'wrong-fb'}`;
  refreshFeedbackLang();
  document.getElementById('check-btn').disabled=true;
  if(current<totalCount-1){document.getElementById('next-btn').style.display='block';}
  else{setTimeout(()=>saveAndShowResult(),600);}
};

window.nextQuestion=function(){current++;loadQ();};

// ── FIREBASE SAVE & RESULT ─────────────────────────────────────────
async function saveAndShowResult(){
  document.getElementById('saving-text').textContent=t('점수 저장 중...','Saving score...');
  document.getElementById('saving-overlay').classList.add('show');
  try{await addDoc(collection(db,'scores'),{name:playerName,score,total:totalCount,timestamp:serverTimestamp()});}
  catch(e){console.error(e);}
  document.getElementById('saving-overlay').classList.remove('show');
  await showResult();
}

async function showResult(){
  showScreen('screen-result');
  playStartBgm();
  const pct=score/totalCount;
  let emoji,tko,ten,mko,men;
  if(pct>=0.9){emoji='🏆';tko='고양이 박사!';ten='Cat Expert!';mko='"고양이에 대한 지식이 정말 놀랍네요! 혹시 고양이와 함께 살고 계신가요? 🐾"';men='"Your knowledge of cats is truly impressive! Do you live with cats? 🐾"';}
  else if(pct>=0.7){emoji='😸';tko='고양이 집사!';ten='Cat Lover!';mko='"꽤 훌륭한 점수예요! 고양이를 많이 좋아하시는 게 느껴집니다. 🐱"';men='"Great score! It\'s clear you really love cats. 🐱"';}
  else if(pct>=0.5){emoji='🐱';tko='고양이 친구!';ten='Cat Friend!';mko='"반반이네요! 조금 더 공부하면 고양이 박사가 될 수 있을 거예요. 📚"';men='"Not bad! A little more study and you\'ll be a cat expert. 📚"';}
  else{emoji='😿';tko='고양이가 낯설군요!';ten='Still Learning!';mko='"괜찮아요! 다시 도전하면서 고양이를 더 알아가 봐요. 🐾"';men='"That\'s OK! Try again and get to know cats better. 🐾"';}

  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=t(tko,ten);
  document.getElementById('result-subtitle').textContent='QUIZ COMPLETE';
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-total').textContent=t(`/ ${totalCount} 점`,`/ ${totalCount} pts`);
  document.getElementById('stat-correct').textContent=score;
  document.getElementById('stat-wrong').textContent=totalCount-score;
  document.getElementById('result-message').textContent=t(mko,men);

  // TOP 10
  const list=document.getElementById('top10-list');list.innerHTML='<div class="hof-loading">🐱</div>';
  try{
    const q2=query(collection(db,'scores'),orderBy('score','desc'),limit(10));
    const snap=await getDocs(q2);
    const rows=[];snap.forEach(doc=>rows.push(doc.data()));
    if(!rows.length){list.innerHTML=`<div class="hof-empty">${t('아직 기록이 없어요 🐾','No records yet 🐾')}</div>`;return;}
    list.innerHTML='';
    const medals=['🥇','🥈','🥉'];
    rows.forEach((r,i)=>{
      const isMe=r.name===playerName&&r.score===score;
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const div=document.createElement('div');div.className=`rank-row${isMe?' me':''}`;
      div.innerHTML=`<span class="rank-num ${rc}">${i<3?medals[i]:i+1}</span><span class="rank-name">${r.name}${isMe?t(' (나)',' (Me)'):''}</span><span class="rank-score">${r.score}${t('점','pts')}</span>`;
      list.appendChild(div);
    });
  }catch(e){list.innerHTML=`<div class="hof-empty">${t('랭킹을 불러올 수 없어요','Could not load ranking')}</div>`;}
}

// ── HALL OF FAME ───────────────────────────────────────────────────
let hofRows=[]; // 언어 전환 시 재렌더링용

function renderHofTable(){
  const content=document.getElementById('hof-content');
  if(!hofRows.length){
    content.innerHTML=`<div class="hof-empty">${t('아직 기록이 없어요.<br>퀴즈를 완료하면 이름이 올라와요! 🐾','No records yet.<br>Complete a quiz to appear here! 🐾')}</div>`;
    return;
  }
  const medals=['🥇','🥈','🥉'];
  let html=`<table class="hof-table"><thead><tr>
    <th>${t('순위','Rank')}</th>
    <th>${t('이름','Name')}</th>
    <th>${t('점수','Score')}</th>
  </tr></thead><tbody>`;
  hofRows.forEach((r,i)=>{
    html+=`<tr><td class="hof-rank-cell">${i<3?medals[i]:i+1}</td><td>${r.name}</td><td>${r.score}${t('점','pts')}</td></tr>`;
  });
  html+='</tbody></table>';
  content.innerHTML=html;
}

window.showHallOfFame=async function(){
  prevScreen=document.querySelector('.screen.active')?.id||'screen-start';
  showScreen('screen-hof');
  stopBgm();
  setLang(lang);
  const content=document.getElementById('hof-content');
  content.innerHTML='<div class="hof-loading">🐱</div>';
  try{
    const q2=query(collection(db,'scores'),orderBy('score','desc'),limit(20));
    const snap=await getDocs(q2);
    hofRows=[];
    snap.forEach(doc=>hofRows.push(doc.data()));
    renderHofTable();
  }catch(e){content.innerHTML=`<div class="hof-empty">${t('데이터를 불러올 수 없어요','Could not load data')}</div>`;}
};

window.goBack=function(){
  stopBgm();
  const target=prevScreen;
  showScreen(target);
  if(target==='screen-result') playStartBgm();
};

window.resetQuiz=function(){
  stopBgm();
  totalCount=0;questions=[];current=0;score=0;
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('start-btn').disabled=true;
  showScreen('screen-start');
  setLang(lang);
  playStartBgm();
};

// init
setLang('ko');
// 시작화면 BGM은 첫 터치 후 시작 (iOS 정책)
document.addEventListener('touchstart',function startBgmOnTouch(){
  playStartBgm();
  document.removeEventListener('touchstart',startBgmOnTouch);
},{once:true});
// PC는 클릭으로
document.addEventListener('click',function startBgmOnClick(){
  playStartBgm();
  document.removeEventListener('click',startBgmOnClick);
},{once:true});
</script>
